<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerala Fat Loss Diet Creator</title>
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <div id="app" class="container">
    <h1>Kerala Fat Loss Diet</h1>

    <div id="input-section">
      <form id="diet-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Years" required min="10" max="100">
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight" placeholder="kg" required min="30" max="300">
          </div>

          <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" name="height" placeholder="cm" required min="100" max="250">
          </div>

          <div class="form-group">
            <label for="activity">Activity Level</label>
            <select id="activity" name="activity" required>
              <option value="sedentary">Sedentary (Little/No Exercise)</option>
              <option value="light">Lightly Active (1-3 days/week)</option>
              <option value="moderate">Moderately Active (3-5 days/week)</option>
              <option value="active">Very Active (6-7 days/week)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="preference">Food Preference</label>
            <select id="preference" name="preference" required>
              <option value="non-veg">Non-Vegetarian (Inc. Fish/Chicken)</option>
              <option value="veg">Vegetarian</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="goal">Goal Speed</label>
            <select id="goal" name="goal" required>
              <option value="normal">Normal (0.5 kg/week) - Recommended</option>
              <option value="fast">Fast (0.75 kg/week) - Aggressive</option>
              <option value="slow">Slow (0.25 kg/week) - Easy</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-primary">Generate Diet Plan</button>
      </form>
    </div>

    <div id="results-section" class="results-container">
      <h2>Your Personalized Plan</h2>
      <div class="summary-card">
        <div class="summary-item">
          <h3 id="target-calories">0</h3>
          <p>Daily Calories</p>
        </div>
        <div class="summary-item">
          <h3 id="daily-water">0 L</h3>
          <p>Water Intake</p>
        </div>
        <div class="summary-item">
          <h3 id="bmr-value">0</h3>
          <p>BMR</p>
        </div>
      </div>

      <div id="weekly-plan" class="plan-grid">
        <!-- Weekly plan cards will be injected here -->
      </div>

      <button id="regenerate-btn" class="btn-secondary">Generate New Plan</button>
    </div>

    <div id="grocery-section" class="results-container" style="display: none; margin-top: 2rem;">
      <h2>Shopping List</h2>
      <div class="summary-card">
        <p>Ingredients needed for this week's plan</p>
      </div>
      <div id="grocery-list" class="grocery-grid">
        <!-- Grocery items injected here -->
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
